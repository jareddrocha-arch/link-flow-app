# Learn more: https://shopify.dev/docs/apps/tools/cli/configuration
# Deploy extensions: shopify app deploy

# Must match the app merchants install (check Admin URL handle + appInstallation.apiKey)
name = "Link Flow Affiliates App"
client_id = "83757e483b8c48497463e2e97b377aff"
application_url = "https://link-flow-app-amber.vercel.app"
embedded = true

[build]
automatically_update_urls_on_dev = false

[access_scopes]
# write_pixels + read_customer_events required for Web Pixel activation
scopes = "read_products,read_orders,write_script_tags,write_pixels,read_customer_events"

[auth]
redirect_urls = [
  "https://link-flow-app-amber.vercel.app/api/auth/callback",
  "http://localhost:3000/api/auth/callback"
]

[webhooks]
api_version = "2026-04"

  # Order webhooks (orders/paid, orders/create) need Protected Customer Data
  # approval first — register later via Admin API or re-add here after PCD access.
  # Thank-you tracking uses the Web Pixel instead.
  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "https://link-flow-app-amber.vercel.app/api/webhooks/shopify"

  [[webhooks.subscriptions]]
  compliance_topics = [ "customers/data_request", "customers/redact", "shop/redact" ]
  uri = "https://link-flow-app-amber.vercel.app/api/webhooks/shopify"
